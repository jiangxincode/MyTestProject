name: Front-End CI

on:
  push:
    branches: [ master ]
    paths: [ 'front-end/**' ]
  pull_request:
    branches: [ master ]
    paths: [ 'front-end/**' ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: front-end
      - name: Run tests
        run: npm test
        working-directory: front-end
